<!--
  miki-moni banner — wide format for the top of README and (after raster
  export) GitHub's social preview slot.

  Layout: 1280×640, white card with a thin slate border. Cat sits on the
  left third; brand name + tagline on the right. Same path data as the
  app logo; stroke widths bumped so it survives at ~600×600 display sizes.

  GitHub renders SVG inline in README markdown. For the repo's Settings
  → Social preview slot GitHub wants PNG/JPG — open this file in a
  browser, screenshot it at 1280×640, or use any svg→png tool.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1280" height="640" viewBox="0 0 1280 640"
     font-family="Inter, 'Noto Sans TC', -apple-system, Segoe UI, sans-serif">

  <!-- card background -->
  <rect x="0" y="0" width="1280" height="640" fill="#ffffff"/>
  <rect x="8" y="8" width="1264" height="624" rx="20"
        fill="none" stroke="#e8e8ec" stroke-width="2"/>

  <!-- cat icon (left side, centered vertically). Re-render the 24-coord
       path at a 22× scale so a 24px viewBox unit ≈ 22px on this banner.
       Cat lives in a 528×528 box centered at (290, 320). -->
  <g transform="translate(26 56) scale(22)"
     fill="none" stroke="#1c2024" stroke-width="1.2"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M4.5 13.2 L6 10 L7.6 13 L9.6 11 L11.4 13 C14.5 13 18.5 13.6 20 15.8 C20.8 17 20.4 18.3 18.6 18.7 C16 19.2 7 19.2 5.4 18.4 C3.8 17.5 3.6 14.5 4.5 13.2 Z"/>
    <path d="M6.8 15.2 q0.9 0.7 1.8 0" stroke-width="1.0"/>
    <path d="M15 7 h2.4 l-2.4 2.6 h2.4" stroke-width="1.0"/>
    <path d="M18.4 4.5 h1.6 l-1.6 1.8 h1.6" stroke-width="0.85"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="580" y="310"
        font-size="120" font-weight="600"
        letter-spacing="-3"
        fill="#1c2024">miki-moni</text>

  <text x="582" y="378"
        font-size="32" font-weight="400"
        fill="#60646c">watch and remote-control your Claude Code sessions</text>

  <!-- small accent: green dot like the dashboard's "online" status chip -->
  <circle cx="566" cy="368" r="6" fill="#1f7a4d"/>

  <!-- corner marks: faint section labels, mimics dashboard chrome -->
  <text x="40" y="610" font-size="14" font-weight="600"
        letter-spacing="2" fill="#8b8d98">MIKI-MONI · CLAUDE CODE SESSION MONITOR</text>
  <text x="1240" y="610" font-size="14" font-weight="500"
        text-anchor="end" fill="#8b8d98">v0.1</text>
</svg>
