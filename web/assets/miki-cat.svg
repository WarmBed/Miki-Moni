<!--
  Miki-Moni mascot — sleeping cat.

  This is the design-source SVG. The dashboard renders an inlined copy of
  the same paths from <IconSleepingCat /> in web/app.tsx so the icon picks
  up the theme's currentColor (light / dark). If you tweak the path data
  here, mirror the change in app.tsx; if you tweak it there, mirror it
  back here so future-you has a standalone file to preview at full size.

  viewBox stays 0 0 24 24 — keeps it pixel-aligned at 24px icon sizes.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="240" height="240"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="1.6"
     stroke-linecap="round"
     stroke-linejoin="round"
     color="#1c2024">
  <!-- Body + two ear peaks in one continuous path -->
  <path d="M4.5 13.2 L6 10 L7.6 13 L9.6 11 L11.4 13 C14.5 13 18.5 13.6 20 15.8 C20.8 17 20.4 18.3 18.6 18.7 C16 19.2 7 19.2 5.4 18.4 C3.8 17.5 3.6 14.5 4.5 13.2 Z"/>
  <!-- Closed sleeping eye -->
  <path d="M6.8 15.2 q0.9 0.7 1.8 0" stroke-width="1.3"/>
  <!-- Two stacked Z's, drifting up -->
  <path d="M15 7 h2.4 l-2.4 2.6 h2.4" stroke-width="1.3"/>
  <path d="M18.4 4.5 h1.6 l-1.6 1.8 h1.6" stroke-width="1.1"/>
</svg>
